<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>历史记录 · AI Video Course</title>
  <link rel="icon" href="data:,">
  <style>
    :root{--paper:#f7f2e9;--card:#fdfaf4;--ink:#211d17;--soft:#5c554a;--faint:#8f8778;--red:#bd3a1d;--line:#d8cdb9;--deep:#efe7d8}
    *{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font:15px/1.8 system-ui,-apple-system,"Noto Sans SC",sans-serif}a{color:inherit}
    .shell{max-width:920px;margin:auto;padding:24px clamp(16px,5vw,42px) 80px}.top{display:flex;align-items:center;justify-content:space-between;gap:16px;padding-bottom:16px;border-bottom:2px solid var(--ink)}
    .brand{font:900 22px/1.2 Georgia,"Noto Serif SC",serif}.brand em{font-style:normal;color:var(--red)}.nav{display:flex;gap:8px;flex-wrap:wrap}.nav a{font-size:12px;text-decoration:none;background:var(--card);padding:6px 12px;border:1px solid var(--line)}
    h1{font:900 clamp(30px,6vw,48px)/1.2 Georgia,"Noto Serif SC",serif;margin:52px 0 10px;letter-spacing:0}p{color:var(--soft);max-width:52ch}.status{margin:32px 0;color:var(--faint)}
    .list{display:grid;gap:12px;margin-top:28px}.record{display:grid;grid-template-columns:7rem minmax(0,1fr);gap:12px;background:var(--card);border:1px solid var(--line);padding:18px 20px;text-decoration:none}
    .record:hover{border-color:var(--red);background:#fffdf8}.type{font-size:12px;font-weight:800;color:var(--red)}.date{display:block;margin-top:4px;font:12px/1.5 ui-monospace,monospace;color:var(--faint)}.record h2{font:800 20px/1.45 Georgia,"Noto Serif SC",serif;margin:0 0 6px}.record p{margin:0;color:var(--soft)}.meta{margin-top:10px;font-size:12px;color:var(--faint)}
    .empty{background:var(--card);border:1px solid var(--line);padding:22px;margin-top:28px}.empty code{background:var(--deep);padding:2px 6px}
    @media(max-width:640px){.top{align-items:flex-start}.record{grid-template-columns:1fr;padding:16px}.shell{padding-top:18px}h1{margin-top:36px}}
  </style>
  <link rel="stylesheet" href="../theme.css">
</head>
<body class="page-history">
  <div class="shell">
    <header class="top">
      <div class="brand">历史<em>记录</em></div>
      <nav class="nav" aria-label="产品入口"><a href="../index.html">视频课堂</a><a href="../briefing/index.html">资讯速听</a></nav>
    </header>
    <main>
      <h1>生成历史记录</h1>
      <p>这里汇总本机生成过的视频课堂和资讯速听记录。每条记录都会对应一份本地 Markdown，方便回看、核对来源和重新打开网页内容。</p>
      <div class="status" id="status">正在读取历史索引…</div>
      <section class="list" id="list" aria-label="历史记录"></section>
    </main>
  </div>
  <script>
    const $=id=>document.getElementById(id);
    const esc=value=>String(value??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
    const typeLabel=type=>type==="course"?"视频课堂":"资讯速听";
    const date=value=>value?String(value).slice(0,10):"";
    function href(record){return `../../${record.web_url}`}
    function markdownHref(record){return String(record.markdown_path||"").startsWith("local-data/")?`../../${record.markdown_path}`:""}
    function render(index){
      const records=Array.isArray(index.records)?index.records:[];
      if(!records.length){
        $("status").textContent="还没有历史记录。";
        $("list").innerHTML=`<div class="empty">运行生成命令后会出现记录，例如 <code>python3 tools/course_pipeline.py --fixture tests/fixtures/course.json</code> 或 <code>python3 tools/briefing_pipeline.py --fixture tests/fixtures/briefing.json</code>。</div>`;
        return;
      }
      $("status").textContent=`共 ${records.length} 条 · 更新于 ${date(index.updated_at)}`;
      $("list").innerHTML=records.map(record=>{const md=markdownHref(record);return`<article class="record"><span><b class="type">${esc(typeLabel(record.type))}</b><span class="date">${esc(date(record.created_at))}</span></span><span><h2><a href="${esc(href(record))}">${esc(record.title)}</a></h2><p>${esc(record.summary)}</p><div class="meta">${esc(record.source_title||"")}${md?` · <a href="${esc(md)}">查看 Markdown</a>`:` · Markdown: ${esc(record.markdown_path||"")}`}</div></span></article>`}).join("");
    }
    fetch("../../local-data/history/index.json").then(response=>{if(!response.ok)throw Error(`HTTP ${response.status}`);return response.json()}).then(render).catch(error=>{
      $("status").textContent="历史索引还不可用。";
      $("list").innerHTML=`<div class="empty">请先运行一次生成管线。历史索引会写入 <code>local-data/history/index.json</code>，Markdown 会保存在 <code>local-data/history/notes/</code>。<br><br>错误：${esc(error.message)}</div>`;
    });
  </script>
</body>
</html>
