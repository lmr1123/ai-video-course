<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生成课程 · 视频课堂</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=Noto+Sans+SC:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--paper:#f7f2e9;--deep:#efe7d8;--card:#fdfaf4;--ink:#211d17;--soft:#5c554a;--faint:#8f8778;--red:#bd3a1d;--line:#d8cdb9;--ochre:#a06b12;--teal:#1f6a5e}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--paper);color:var(--ink);font:15px/1.85 var(--sans,"Noto Sans SC",sans-serif)}
button{font:inherit}a{color:inherit}.site-header{position:sticky;top:0;z-index:50;background:var(--paper);border-bottom:1px solid var(--line)}.top-inner{max-width:1280px;margin:auto;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;gap:24px}.brand{display:flex;align-items:baseline;gap:12px;color:var(--ink);text-decoration:none;white-space:nowrap}.brand strong{font:900 22px/1.2 var(--serif,"Noto Serif SC",serif);letter-spacing:.08em}.brand em{color:var(--red);font-style:normal}.brand small{font:10.5px/1.2 var(--mono,monospace);color:var(--faint);letter-spacing:.14em}.header-nav{display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-wrap:wrap}.header-nav a{min-height:33px;padding:4px 14px;border:1px solid var(--line);background:var(--card);font-size:12.5px;font-weight:700;text-decoration:none}.header-nav a:hover{border-color:var(--red);color:var(--red)}.header-nav a[aria-current="page"]{background:var(--ink);border-color:var(--ink);color:var(--paper)}
.shell{max-width:1280px;margin:auto;padding:30px 28px 120px}.layout{display:grid;grid-template-columns:460px minmax(0,1fr);gap:44px;align-items:start}.side,main{min-width:0}.side{position:sticky;top:86px}.video{width:100%;aspect-ratio:16/9;background:#000;border:1px solid var(--line);box-shadow:0 10px 28px rgba(33,29,23,.08)}.video iframe{width:100%;height:100%;border:0}.time{font:12px var(--mono,monospace);color:var(--red);margin:10px 2px}.map-wrap{margin-top:24px}.map-title{display:flex;align-items:center;gap:10px;margin:0 0 12px;font:700 15px/1.5 var(--serif,"Noto Serif SC",serif);letter-spacing:.12em}.map-title::after{content:"";flex:1;height:1px;background:var(--line)}.map{list-style:none;padding:0;margin:0;max-height:calc(100vh - 470px);overflow:auto}.map li{display:grid;grid-template-columns:52px 1fr auto;gap:10px;align-items:baseline;padding:7px 8px;border-radius:2px;cursor:pointer}.map li.active{background:var(--card)}.map time{font:11px var(--mono,monospace);color:var(--faint)}.badge{font-size:10px;border:1px solid var(--line);padding:0 6px;height:max-content}.深讲{color:var(--red)}.快讲{color:var(--ochre)}.原片{color:var(--teal)}
.eyebrow{font:11px/1.6 var(--mono,monospace);letter-spacing:.18em;color:var(--red)}h1,h2,h3,h4{font-family:var(--serif,"Noto Serif SC",serif);line-height:1.45}h1{font-size:clamp(26px,2.6vw,34px);margin:8px 0 10px}.lead{font-size:16.5px;color:var(--soft);max-width:68ch}.facts{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin:24px 0}.fact{background:var(--card);padding:16px 18px;border-radius:2px}.fact b{display:block;font-size:12px;margin-bottom:4px}.section-heading{display:flex;align-items:baseline;gap:14px;margin:48px 0 20px}.section-heading .no{font:900 30px/1 var(--serif,"Noto Serif SC",serif);color:var(--red)}.section-heading h2{margin:0;font-size:20px;letter-spacing:.05em}
.learning-views{display:flex;align-items:center;flex-wrap:wrap;gap:8px 10px;margin:20px 0 8px;padding:12px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}.learning-views-label{font-size:11px;font-weight:800;color:var(--faint);letter-spacing:.12em;margin-right:4px}.learning-view{display:inline-flex;align-items:center;min-height:36px;padding:5px 11px;border:1px solid var(--ink);font-size:12px;font-weight:800;text-decoration:none}.learning-view.active{background:var(--ink);color:var(--paper)}a.learning-view:hover{background:var(--red);border-color:var(--red);color:var(--paper)}.learning-view-reason{width:100%;margin:2px 0 0;color:var(--soft);font-size:12px;line-height:1.65}
.claims{padding-left:22px}.claims li{margin:8px 0}.ts{font:11px ui-monospace,monospace;color:var(--red);border-bottom:1px solid;cursor:pointer;white-space:nowrap}.module{margin:0 0 56px}.module-head{border-bottom:2px solid var(--ink);padding-bottom:10px;margin-bottom:14px}.module-head h3{margin:0;font-size:20px}.meta{font-size:12px;color:var(--soft)}.summary{background:var(--ink);color:var(--paper);padding:16px 18px;margin:14px 0}.cards{display:flex;flex-direction:column;gap:12px}.card{background:var(--card);border:1px solid var(--line);padding:18px 20px}.card h4{font-size:15px;margin:0 0 8px}.card p{margin:0;white-space:pre-line}.evidence{padding:10px 0;border-top:1px solid var(--line)}.evidence:first-of-type{border-top:0}.attr{font-size:10px;font-weight:800;color:var(--red);margin-right:6px}
.recall{background:var(--card);border:0;padding:22px;margin-top:54px}.recall .section-heading{margin-top:0}.recall textarea{width:100%;min-height:140px;padding:12px;border:1px solid var(--line);background:#fffdf8;font:14px/1.7 inherit}.recall button{margin-top:10px;padding:8px 16px;border:1px solid var(--ink);background:var(--ink);color:var(--paper);font-weight:700}.reference{border-top:0;background:var(--paper);margin-top:16px;padding:14px}
.error{max-width:680px;margin:15vh auto;background:var(--card);border:1px solid var(--line);padding:24px}
@media(max-width:900px){.top-inner{align-items:flex-start;padding:12px 16px}.brand small{display:none}.header-nav{gap:6px}.header-nav a{padding:4px 10px}.layout{grid-template-columns:1fr}.side{position:static}.map{max-height:none}h1{font-size:26px}.facts{grid-template-columns:1fr}.shell{padding:24px 16px 88px}.card{padding:15px 14px}}
@media(max-width:560px){.top-inner{display:block}.header-nav{justify-content:flex-start;margin-top:10px}.header-nav a[aria-current="page"]{display:none}.learning-view-reason{font-size:11.5px}}
</style>
<link rel="stylesheet" href="../theme.css">
</head>
<body class="page-generated">
<div id="app"><div class="shell"><div class="error">正在加载课程…</div></div></div>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const fmt=s=>`${String(Math.floor(s/3600)).padStart(2,"0")}:${String(Math.floor(s%3600/60)).padStart(2,"0")}:${String(Math.floor(s%60)).padStart(2,"0")}`;
const id=new URLSearchParams(location.search).get("id");let player,course;
const stamp=s=>`<button class="ts" data-t="${s}" type="button">${fmt(s)}</button>`;
function evidence(items){return items.map(x=>`<div class="evidence"><span class="attr">${esc(x.attribution)}</span>${esc(x.text)} ${x.start_sec===null?"":stamp(x.start_sec)}</div>`).join("")}
function render(c){
 course=c;document.title=`${c.course_title} · 视频课堂`;
 const visual=c.learning_views?.visual_reading;
 const privateLearningViewsAvailable=!location.hostname.endsWith("github.io");
 const learningViews=visual&&privateLearningViewsAvailable?`<nav class="learning-views" aria-label="当前课程学习方式"><span class="learning-views-label">学习方式</span><span class="learning-view active" aria-current="page">视频课堂</span><a class="learning-view" href="${esc(visual.path)}">${esc(visual.label)}</a><p class="learning-view-reason">${esc(visual.reason)}</p></nav>`:"";
 document.getElementById("app").innerHTML=`
  <header class="site-header"><div class="top-inner"><a class="brand" href="../index.html"><strong>视频<em>课堂</em></strong><small>VIDEO → COURSE</small></a><nav class="header-nav" aria-label="产品入口"><a href="#" aria-current="page">当前课程</a><a href="../index.html">课程入口</a><a href="../briefing/index.html">资讯速听</a><a href="../history/index.html">历史记录</a><a href="../relecture/index.html">重讲课</a></nav></div></header>
  <div class="shell"><div class="layout"><aside class="side"><div class="video" id="player"></div><div class="time" id="now">00:00:00</div><nav class="map-wrap" aria-label="知识地图"><h2 class="map-title">知识地图 · 跳转导航</h2><ol class="map">${c.topics.map((x,i)=>`<li data-i="${i}" data-t="${x.start_sec}"><time>${fmt(x.start_sec).replace(/^00:/,"")}</time><span>${esc(x.title)}</span><span class="badge ${x.action}">${x.action}</span></li>`).join("")}</ol></nav></aside>
  <main><div class="eyebrow">${esc(c.channel)} · ${Math.round(c.duration_sec/60)} 分钟</div><h1>${esc(c.course_title)}</h1><p class="lead">${esc(c.one_sentence)}</p>${learningViews}
  <div class="facts"><div class="fact"><b>适合谁</b>${esc(c.audience)}</div><div class="fact"><b>前置知识</b>${c.prerequisites.map(esc).join(" · ")}</div><div class="fact"><b>预期收获</b>${c.expected_gain.map(esc).join(" · ")}</div><div class="fact"><b>原视频</b>${esc(c.source_title)}</div></div>
  <div class="section-heading"><span class="no">一</span><h2>课程导读 · 核心主张</h2></div><ol class="claims">${c.claims.map(x=>`<li>${esc(x.text)} ${stamp(x.start_sec)}</li>`).join("")}</ol>
  <div class="section-heading"><span class="no">二</span><h2>深讲模块（${c.deep_modules.length} 个）</h2></div>${c.deep_modules.map((m,n)=>`<section class="module"><div class="module-head"><h3>模块${n+1} · ${esc(m.title)}</h3><div class="meta">${fmt(m.start_sec)}–${fmt(m.end_sec)} · ${esc(m.content_type)} · ${esc(m.learning_goal)}</div></div><div class="summary">${esc(m.summary_30s)}</div><div class="cards">
   <article class="card"><h4>问题</h4><p>${esc(m.problem)}</p></article><article class="card"><h4>作者的核心判断</h4>${evidence(m.author_judgment)}</article><article class="card"><h4>用人话理解</h4><p>${esc(m.plain_explanation)}</p></article><article class="card"><h4>背后的机制</h4><p>${esc(m.mechanism)}</p></article><article class="card"><h4>案例</h4>${evidence(m.cases)}</article><article class="card"><h4>对项目的价值</h4><p>${esc(m.value)}</p></article><article class="card"><h4>最小实践</h4><p>${esc(m.practice)}</p></article><article class="card"><h4>技术深入</h4><p>${esc(m.technical_deep_dive)}</p></article>
  </div></section>`).join("")}
  <section class="recall"><div class="section-heading"><span class="no">三</span><h2>学完后复述核心机制</h2></div><p>${esc(c.recall_prompt)}</p><textarea id="answer" aria-label="闭卷复述"></textarea><button id="submit" type="button">完成复述，查看自检</button><div class="reference" id="reference" hidden><b>对照要点</b><ul>${c.recall_points.map(x=>`<li>${esc(x)}</li>`).join("")}</ul></div></section></main></div></div>`;
 const key=`ai-video-course:${c.video_id}:recall`,saved=localStorage.getItem(key);if(saved)document.getElementById("answer").value=saved;
 document.getElementById("submit").onclick=()=>{const v=document.getElementById("answer").value.trim();if(!v){document.getElementById("answer").focus();return}localStorage.setItem(key,v);document.getElementById("reference").hidden=false};
 document.addEventListener("click",e=>{const x=e.target.closest("[data-t]");if(x&&player&&player.seekTo){player.seekTo(+x.dataset.t,true);player.playVideo()}});
 bootPlayer();
}
function bootPlayer(){const create=()=>player=new YT.Player("player",{videoId:course.video_id,playerVars:{rel:0,cc_load_policy:1,cc_lang_pref:"en"},events:{onReady:()=>setInterval(sync,1000)}});if(window.YT&&YT.Player)create();else window.onYouTubeIframeAPIReady=create}
function sync(){if(!player?.getCurrentTime)return;const t=player.getCurrentTime();document.getElementById("now").textContent=fmt(t);let i=0;course.topics.forEach((x,n)=>{if(t>=x.start_sec)i=n});document.querySelectorAll(".map li").forEach((x,n)=>x.classList.toggle("active",n===i))}
async function start(){
 if(!id||!/^[\w-]{11}$/.test(id))throw Error("课程 id 无效");
 const response=await fetch(`${encodeURIComponent(id)}/course.json`);if(!response.ok)throw Error("课程不存在");render(await response.json());
}
start().catch(e=>document.getElementById("app").innerHTML=`<div class="shell"><div class="error"><h1>无法加载课程</h1><p>${esc(e.message)}</p><a href="../index.html">返回课程入口</a></div></div>`);
</script>
</body>
</html>
