<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生成课程 · 视频课堂</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=Noto+Sans+SC:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--paper:#f7f2e9;--deep:#efe7d8;--card:#fdfaf4;--ink:#211d17;--soft:#5c554a;--faint:#8f8778;--red:#bd3a1d;--line:#d8cdb9;--ochre:#a06b12;--teal:#1f6a5e}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--paper);color:var(--ink);font:15px/1.85 var(--sans,"Noto Sans SC",sans-serif)}
button{font:inherit}a{color:inherit}.site-header{position:sticky;top:0;z-index:50;background:var(--paper);border-bottom:1px solid var(--line)}.top-inner{max-width:1280px;margin:auto;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;gap:24px}.brand{display:flex;align-items:baseline;gap:12px;color:var(--ink);text-decoration:none;white-space:nowrap}.brand strong{font:900 22px/1.2 var(--serif,"Noto Serif SC",serif);letter-spacing:.08em}.brand em{color:var(--red);font-style:normal}.brand small{font:10.5px/1.2 var(--mono,monospace);color:var(--faint);letter-spacing:.14em}.header-nav{display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-wrap:wrap}.header-nav a{min-height:33px;padding:4px 14px;border:1px solid var(--line);background:var(--card);font-size:12.5px;font-weight:700;text-decoration:none}.header-nav a:hover{border-color:var(--red);color:var(--red)}.header-nav a[aria-current="page"]{background:var(--ink);border-color:var(--ink);color:var(--paper)}
.shell{max-width:1280px;margin:auto;padding:30px 28px 120px}.layout{display:grid;grid-template-columns:460px minmax(0,1fr);gap:44px;align-items:start}.side,main{min-width:0}.side{position:sticky;top:86px}.player-frame{border:2px solid var(--ink);background:#000;box-shadow:8px 8px 0 var(--deep)}.video{width:100%;aspect-ratio:16/9;background:#000}.video iframe{width:100%;height:100%;border:0}.subtitle-box{padding:8px 14px;background:#000;color:#aaa;text-align:center;font-size:11px}.now-playing{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin:12px 2px 0;color:var(--soft);font-size:12px}.time{color:var(--red);font:12px var(--mono,monospace)}.player-external{color:var(--soft);text-decoration:none}.player-external:hover{color:var(--red)}.map-wrap{margin-top:24px}.map-title{display:flex;align-items:center;gap:10px;margin:0 0 12px;font:700 15px/1.5 var(--serif,"Noto Serif SC",serif);letter-spacing:.12em}.map-title::after{content:"";flex:1;height:1px;background:var(--line)}.map{list-style:none;padding:0;margin:0;max-height:calc(100vh - 470px);overflow:auto}.map li{display:grid;grid-template-columns:52px 1fr auto;gap:10px;align-items:baseline;padding:7px 8px;border-bottom:1px solid var(--line);cursor:pointer}.map li.active{background:var(--card)}.map time{font:11px var(--mono,monospace);color:var(--faint)}.badge{font-size:10px;border:1px solid var(--line);padding:0 6px;height:max-content}.深讲{color:var(--red)}.快讲{color:var(--ochre)}.原片{color:var(--teal)}
.eyebrow{font:11px/1.6 var(--mono,monospace);letter-spacing:.18em;color:var(--red)}h1,h2,h3,h4{font-family:var(--serif,"Noto Serif SC",serif);line-height:1.45}h1{font-size:clamp(26px,2.6vw,34px);margin:8px 0 10px}.lead{font-size:16.5px;color:var(--soft);max-width:68ch}.course-meta{display:flex;gap:18px;flex-wrap:wrap;margin:18px 0 30px;color:var(--soft);font-size:12.5px}.course-meta b{color:var(--ink)}.section-heading{display:flex;align-items:baseline;gap:14px;margin:48px 0 20px}.section-heading::after{content:"";flex:1;height:2px;background:var(--ink)}.section-heading .no{font:900 30px/1 var(--serif,"Noto Serif SC",serif);color:var(--red)}.section-heading h2{margin:0;font-size:20px;letter-spacing:.05em}
.learning-views{display:flex;align-items:center;flex-wrap:wrap;gap:8px 10px;margin:20px 0 8px;padding:12px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}.learning-views-label{font-size:11px;font-weight:800;color:var(--faint);letter-spacing:.12em;margin-right:4px}.learning-view{display:inline-flex;align-items:center;min-height:36px;padding:5px 11px;border:1px solid var(--ink);font-size:12px;font-weight:800;text-decoration:none}.learning-view.active{background:var(--ink);color:var(--paper)}a.learning-view:hover{background:var(--red);border-color:var(--red);color:var(--paper)}.learning-view-reason{width:100%;margin:2px 0 0;color:var(--soft);font-size:12px;line-height:1.65}
.deck{border:2px solid var(--ink);background:var(--card);padding:26px 30px;box-shadow:8px 8px 0 var(--deep)}.deck .theme{font:700 16.5px/1.8 var(--serif,"Noto Serif SC",serif);margin:0 0 18px}.deck .theme::before{content:"主题 ";display:block;margin-bottom:4px;color:var(--red);font:700 11px/1.5 var(--sans,"Noto Sans SC",sans-serif);letter-spacing:.2em}.claims{list-style:none;counter-reset:claim;padding:0;margin:0 0 6px}.claims li{counter-increment:claim;position:relative;padding:10px 0 10px 40px;border-top:1px solid var(--line);font-size:14px}.claims li::before{content:counter(claim,cjk-ideographic);position:absolute;left:2px;top:12px;color:var(--red);font:900 15px/1.5 var(--serif,"Noto Serif SC",serif)}.deck-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:16px;border-top:1px solid var(--line);background:var(--line)}.deck-cell{background:var(--card);padding:14px 16px 14px 0}.deck-cell h4{margin:0 0 6px;color:var(--faint);font:700 11.5px/1.5 var(--sans,"Noto Sans SC",sans-serif);letter-spacing:.18em}.deck-cell p{margin:0;color:var(--soft);font-size:13px;line-height:1.75}.ts-chip{border:1px solid var(--line);border-radius:2px;background:rgba(239,231,216,.42);padding:1px 7px;color:var(--faint);font:11px/1.5 var(--mono,monospace);cursor:pointer;white-space:nowrap}.ts-chip::before{content:"▶ ";font-size:8px}.ts-chip:hover{background:var(--red);color:#fff}.map-detail{display:none;grid-column:2/4;padding:2px 0 7px;color:var(--soft);font-size:12px;line-height:1.65}.map li.active .map-detail{display:block}.map-detail strong{color:var(--ink)}
.module{margin:0 0 64px}.module-head{padding-bottom:10px;border-bottom:2px solid var(--ink)}.module-head h3{margin:0;font-size:20px}.module-head .sub{display:flex;gap:16px;flex-wrap:wrap;margin:6px 0 4px;color:var(--soft);font-size:12.5px}.depth-tabs{display:flex;width:fit-content;margin:18px 0 26px;border:1.5px solid var(--ink)}.depth-tabs button{border:0;border-right:1.5px solid var(--ink);background:var(--card);padding:7px 20px;color:var(--soft);font-size:12.5px;font-weight:700;cursor:pointer}.depth-tabs button:last-child{border-right:0}.depth-tabs button.on{background:var(--ink);color:var(--paper)}.brief{background:var(--ink);color:var(--paper);padding:20px 24px;font-size:14px;line-height:2}.brief .lb{display:block;margin-bottom:6px;color:#e7a690;font-size:11px;letter-spacing:.2em}.qa{margin-bottom:12px;padding:18px 20px;background:var(--card);border:1px solid var(--line)}.qa h4{display:flex;align-items:baseline;gap:10px;margin:0 0 10px;font-size:15px;font-weight:900}.qa h4 .qno{color:var(--red);font:500 11px/1.5 var(--mono,monospace)}.qa p{margin:0 0 8px;font-size:14px;white-space:pre-line}.qa p:last-child{margin-bottom:0}.pull{margin:12px 0;padding:12px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);font:15px/2 var(--serif,"Noto Serif SC",serif)}.attr{display:inline-block;margin-right:6px;border:1px solid var(--teal);border-radius:2px;background:#e1eee9;padding:1px 7px;color:var(--teal);font-size:10.5px;font-weight:700;letter-spacing:.05em}.practice{margin-top:12px;padding:12px 14px;border-left:3px solid var(--red);background:var(--paper);font-size:13.5px}.recall{background:var(--card);border:1px solid var(--line);padding:26px;margin-top:54px}.recall h3{margin:0 0 8px;font-size:19px}.recall .hint{margin:0 0 16px;color:var(--soft);font-size:13px}.recall textarea{width:100%;min-height:150px;padding:14px;border:1.5px solid var(--ink);background:#fffdf8;font:14px/1.8 inherit;resize:vertical}.recall-actions{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:12px}.recall button{padding:8px 18px;border:1.5px solid var(--ink);background:var(--ink);color:var(--paper);font-weight:700}.recall-status{color:var(--soft);font-size:12px}.reference{margin-top:22px;padding-top:18px;border-top:1px solid var(--line)}
.error{max-width:680px;margin:15vh auto;background:var(--card);border:1px solid var(--line);padding:24px}
@media(max-width:900px){.top-inner{align-items:flex-start;padding:12px 16px}.brand small{display:none}.header-nav{gap:6px}.header-nav a{padding:4px 10px}.layout{grid-template-columns:1fr}.side{position:static}.map{max-height:none}h1{font-size:26px}.shell{padding:24px 16px 88px}.module-head{position:sticky;top:0;z-index:30;background:var(--paper);padding-top:10px}.qa{padding:15px 14px}}
@media(max-width:560px){.top-inner{display:block}.header-nav{justify-content:flex-start;margin-top:10px}.header-nav a[aria-current="page"]{display:none}.learning-view-reason{font-size:11.5px}.deck{padding:20px 18px;box-shadow:5px 5px 0 var(--deep)}.deck-grid{grid-template-columns:1fr}.depth-tabs{width:100%}.depth-tabs button{flex:1;padding-inline:8px}.section-heading{gap:10px}.section-heading h2{font-size:18px}}
</style>
<link rel="stylesheet" href="../theme.css">
</head>
<body class="page-generated">
<div id="app"><div class="shell"><div class="error">正在加载课程…</div></div></div>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const fmt=s=>`${String(Math.floor(s/3600)).padStart(2,"0")}:${String(Math.floor(s%3600/60)).padStart(2,"0")}:${String(Math.floor(s%60)).padStart(2,"0")}`;
const id=new URLSearchParams(location.search).get("id");let player,course;
const stamp=s=>`<button class="ts-chip" data-t="${s}" type="button">${fmt(s)}</button>`;
const cn=n=>["零","一","二","三","四","五","六","七","八","九","十"][n]||n;
function evidence(items){return items.map(x=>`<p><span class="attr">${esc(x.attribution)}</span>${esc(x.text)} ${x.start_sec===null?"":stamp(x.start_sec)}</p>`).join("")}
function valuableModules(c){return c.deep_modules.map(m=>`${esc(m.title)} ${stamp(m.start_sec)}`).join("　")}
function skippableTopics(c){const items=c.topics.filter(x=>x.action!=="深讲");return items.length?items.map(x=>`${esc(x.title)} ${stamp(x.start_sec)}`).join("　"):"本课没有建议直接跳过的章节。"}
function render(c){
 course=c;document.title=`${c.course_title} · 视频课堂`;
 const visual=c.learning_views?.visual_reading;
 const privateLearningViewsAvailable=!location.hostname.endsWith("github.io");
 const learningViews=visual&&privateLearningViewsAvailable?`<nav class="learning-views" aria-label="当前课程学习方式"><span class="learning-views-label">学习方式</span><span class="learning-view active" aria-current="page">视频课堂</span><a class="learning-view" href="${esc(visual.path)}">${esc(visual.label)}</a><p class="learning-view-reason">${esc(visual.reason)}</p></nav>`:"";
 document.getElementById("app").innerHTML=`
  <header class="site-header"><div class="top-inner"><a class="brand" href="../index.html"><strong>视频<em>课堂</em></strong><small>VIDEO → COURSE</small></a><nav class="header-nav" aria-label="产品入口"><a href="#" aria-current="page">当前课程</a><a href="../index.html">课程入口</a><a href="../briefing/index.html">资讯速听</a><a href="../history/index.html">历史记录</a><a href="../relecture/index.html">重讲课</a></nav></div></header>
  <div class="shell"><div class="layout"><aside class="side"><div class="player-frame"><div class="video" id="player"></div><div class="subtitle-box">中文字幕使用 YouTube 字幕，可在播放器中切换</div></div><div class="now-playing"><span class="time" id="now">00:00:00</span><a class="player-external" href="${esc(c.source_url)}" target="_blank" rel="noopener">在 YouTube 中打开 ↗</a></div><nav class="map-wrap" aria-label="知识地图"><h2 class="map-title">知识地图 · 跳转导航</h2><ol class="map">${c.topics.map((x,i)=>`<li data-i="${i}" data-t="${x.start_sec}"><time>${fmt(x.start_sec).replace(/^00:/,"")}</time><span>${esc(x.title)}</span><span class="badge ${x.action}">${x.action}</span><span class="map-detail"><strong>核心：</strong>${esc(x.core)}<br><strong>价值：</strong>${esc(x.why)}</span></li>`).join("")}</ol></nav></aside>
  <main><div class="eyebrow">${esc(c.channel)}</div><h1>${esc(c.course_title)}</h1><p class="lead">${esc(c.one_sentence)}</p>${learningViews}<div class="course-meta"><span>原片 <b>${Math.round(c.duration_sec/60)} 分钟</b></span><span>课程预计 <b>${c.deep_modules.length*5+10}–${c.deep_modules.length*6+12} 分钟</b></span><span>预期收获 <b>${c.expected_gain.map(esc).join(" · ")}</b></span></div>
  <section><div class="section-heading"><span class="no">一</span><h2>课程导读 · 决策卡</h2></div><div class="deck"><p class="theme">${esc(c.one_sentence)}</p><ul class="claims">${c.claims.map(x=>`<li>${esc(x.text)} ${stamp(x.start_sec)}</li>`).join("")}</ul><div class="deck-grid"><div class="deck-cell"><h4>适合谁</h4><p>${esc(c.audience)}</p></div><div class="deck-cell"><h4>前置知识</h4><p>${c.prerequisites.map(esc).join(" · ")}</p></div><div class="deck-cell"><h4>最值得看</h4><p>${valuableModules(c)}</p></div><div class="deck-cell"><h4>可跳过 / 快讲</h4><p>${skippableTopics(c)}</p></div></div></div></section>
  <section><div class="section-heading"><span class="no">二</span><h2>深讲模块（${c.deep_modules.length} 个）</h2></div>${c.deep_modules.map((m,n)=>`<article class="module"><div class="module-head"><h3>模块${cn(n+1)} · ${esc(m.title)}</h3><div class="sub"><span>时间范围 ${stamp(m.start_sec)} – ${fmt(m.end_sec)}</span><span>${esc(m.content_type)}</span><span>目标：${esc(m.learning_goal)}</span></div></div><div class="depth-tabs" role="tablist" aria-label="讲解深度"><button data-d="d30" type="button">30 秒理解</button><button data-d="dn" class="on" type="button">通俗讲解</button><button data-d="dd" type="button">技术深入</button></div><div data-pane="d30" hidden><div class="brief"><span class="lb">30 秒版本</span>${esc(m.summary_30s)}</div></div><div data-pane="dn"><div class="qa"><h4><span class="qno">Q1</span>这部分解决什么问题</h4><p>${esc(m.problem)}</p></div><div class="qa"><h4><span class="qno">Q2</span>作者的核心判断</h4><div class="pull">${evidence(m.author_judgment)}</div></div><div class="qa"><h4><span class="qno">Q3</span>用人话怎么理解</h4><p>${esc(m.plain_explanation)}</p></div><div class="qa"><h4><span class="qno">Q4</span>背后的机制</h4><p>${esc(m.mechanism)}</p></div><div class="qa"><h4><span class="qno">Q5</span>原视频案例与边界</h4>${evidence(m.cases)}</div><div class="qa"><h4><span class="qno">Q6</span>对项目的价值＋最小实践</h4><p>${esc(m.value)}</p><div class="practice"><b>最小实践：</b>${esc(m.practice)}</div></div></div><div data-pane="dd" hidden><div class="qa"><h4><span class="qno">＋</span>技术深入 · 追问方向</h4><p>${esc(m.technical_deep_dive)}</p><p><span class="attr">学习目标</span>${esc(m.learning_goal)}</p></div></div></article>`).join("")}</section>
  <section class="recall"><h3>学完后复述核心机制</h3><p class="hint">先合上上面的讲义，用自己的话回答。提交前不会显示参考要点。</p><p>${esc(c.recall_prompt)}</p><textarea id="answer" aria-label="闭卷复述" placeholder="请用自己的话复述，不必照抄讲义。"></textarea><div class="recall-actions"><button id="submit" type="button">完成复述，查看自检</button><span class="recall-status" id="recall-status"></span></div><div class="reference" id="reference" hidden><b>对照要点</b><ul>${c.recall_points.map(x=>`<li>${esc(x)}</li>`).join("")}</ul></div></section></main></div></div>`;
 const key=`ai-video-course:${c.video_id}:recall`,saved=localStorage.getItem(key);if(saved)document.getElementById("answer").value=saved;
 if(saved)document.getElementById("recall-status").textContent="已恢复上次作答";
 document.querySelectorAll(".module").forEach(mod=>mod.querySelector(".depth-tabs").addEventListener("click",e=>{const btn=e.target.closest("button");if(!btn)return;mod.querySelectorAll(".depth-tabs button").forEach(x=>x.classList.toggle("on",x===btn));mod.querySelectorAll("[data-pane]").forEach(x=>x.hidden=x.dataset.pane!==btn.dataset.d)}));
 document.getElementById("submit").onclick=()=>{const v=document.getElementById("answer").value.trim();if(!v){document.getElementById("recall-status").textContent="请先写下你的复述";document.getElementById("answer").focus();return}localStorage.setItem(key,v);document.getElementById("reference").hidden=false;document.getElementById("recall-status").textContent="已保存到当前浏览器，请自行对照要点"};
 document.addEventListener("click",e=>{const x=e.target.closest("[data-t]");if(x&&player&&player.seekTo){player.seekTo(+x.dataset.t,true);player.playVideo()}});
 bootPlayer();
}
function bootPlayer(){const create=()=>player=new YT.Player("player",{videoId:course.video_id,playerVars:{rel:0,cc_load_policy:1,cc_lang_pref:"en"},events:{onReady:()=>setInterval(sync,1000)}});if(window.YT&&YT.Player)create();else window.onYouTubeIframeAPIReady=create}
function sync(){if(!player?.getCurrentTime)return;const t=player.getCurrentTime();document.getElementById("now").textContent=fmt(t);let i=0;course.topics.forEach((x,n)=>{if(t>=x.start_sec)i=n});document.querySelectorAll(".map li").forEach((x,n)=>x.classList.toggle("active",n===i))}
async function start(){
 if(!id||!/^[\w-]{11}$/.test(id))throw Error("课程 id 无效");
 const response=await fetch(`${encodeURIComponent(id)}/course.json`);if(!response.ok)throw Error("课程不存在");render(await response.json());
}
start().catch(e=>document.getElementById("app").innerHTML=`<div class="shell"><div class="error"><h1>无法加载课程</h1><p>${esc(e.message)}</p><a href="../index.html">返回课程入口</a></div></div>`);
</script>
</body>
</html>
